<!-- RainLog 雨量记录 — WeatherNext family UI — last 3 full months + current month to yesterday · Open-Meteo -->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>雨量记录 RainLog</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="雨量记录">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#84d2f8">
<meta name="format-detection" content="telephone=no">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="manifest" href="data:application/json;base64,eyJuYW1lIjogIumbqOmHj+iusOW9lSBSYWluTG9nIiwgInNob3J0X25hbWUiOiAi6Zuo6YeP6K6w5b2VIiwgInN0YXJ0X3VybCI6ICIuIiwgImRpc3BsYXkiOiAic3RhbmRhbG9uZSIsICJiYWNrZ3JvdW5kX2NvbG9yIjogIiM4NGQyZjgiLCAidGhlbWVfY29sb3IiOiAiIzg0ZDJmOCIsICJpY29ucyI6IFt7InNyYyI6ICJpY29uLTE5Mi5wbmciLCAic2l6ZXMiOiAiMTkyeDE5MiIsICJ0eXBlIjogImltYWdlL3BuZyIsICJwdXJwb3NlIjogImFueSBtYXNrYWJsZSJ9LCB7InNyYyI6ICJpY29uLTUxMi5wbmciLCAic2l6ZXMiOiAiNTEyeDUxMiIsICJ0eXBlIjogImltYWdlL3BuZyIsICJwdXJwb3NlIjogImFueSBtYXNrYWJsZSJ9XX0=">
<style>
  :root{
    --safe-top:env(safe-area-inset-top);
    --safe-bottom:env(safe-area-inset-bottom);
    --blue:#1d4ed8; --blue-deep:#1e3a5f; --sky:#84d2f8;
    --slate-900:#0f172a; --slate-700:#334155; --slate-600:#475569;
    --slate-500:#64748b; --slate-400:#94a3b8; --slate-300:#cbd5e1;
    --slate-200:#e2e8f0; --slate-100:#f1f5f9; --slate-50:#f8fafc;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html{line-height:1.5;-webkit-text-size-adjust:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;
    background:var(--slate-100); color:#000; margin:0; padding:0;
    -webkit-font-smoothing:antialiased; min-height:100vh;
    user-select:none; -webkit-user-select:none;
    padding-bottom:calc(48px + var(--safe-bottom));
  }
  .tabular{font-variant-numeric:tabular-nums}
  header{
    background:#fff; border-bottom:2px solid var(--slate-100);
    display:flex; align-items:center; justify-content:space-between;
    padding:0 18px; padding-top:var(--safe-top);
    height:calc(76px + var(--safe-top));
    position:sticky; top:0; z-index:50;
  }
  .h-left{display:flex; align-items:center; gap:14px; min-width:0}
  .icon-tile{
    width:34px; height:34px; background:var(--blue); border-radius:11px;
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 4px 6px -1px rgba(0,0,0,.1),0 2px 4px -2px rgba(0,0,0,.1);
    flex:none;
  }
  .icon-tile img{width:34px; height:34px; border-radius:11px; display:block;}
  .h-title h1{
    font-size:20px; font-weight:900; letter-spacing:-.03em; line-height:1;
    color:var(--slate-900); margin:0; white-space:nowrap;
  }
  .h-title .sub{
    font-size:11px; font-weight:700; color:var(--slate-400);
    margin-top:5px; text-transform:uppercase; letter-spacing:.02em;
  }
  .h-actions{display:flex; align-items:center; gap:8px; flex:none}
  .add-btn{
    display:flex; align-items:center; justify-content:center; width:38px; height:38px;
    background:none; color:var(--blue);
    border:none; cursor:pointer; transition:transform .15s; flex:none;
  }
  .add-btn:active{transform:scale(.9)}
  .info-btn{
    display:flex; align-items:center; justify-content:center; width:38px; height:38px;
    background:none; color:var(--blue);
    border:none; cursor:pointer; transition:transform .15s; flex:none;
  }
  .info-btn:active{transform:scale(.9)}
  .lang-btn{
    background:none; color:var(--blue);
    border:none; border-radius:9999px;
    height:38px; padding:0 12px; font-size:14px; font-weight:900;
    cursor:pointer; flex:none; transition:transform .15s, background .15s, color .15s;
  }
  .lang-btn:active{transform:scale(.9)}
  .lang-btn.lang-active{
    background:#eff6ff; color:var(--blue);
  }
  main{max-width:760px; margin:0 auto; padding:14px}
  .attrib{
    display:flex; justify-content:center;
    margin-top:18px; padding-bottom:calc(10px + var(--safe-bottom));
  }
  .attrib a{
    font-size:11px; font-weight:600; color:var(--slate-400);
    text-decoration:none; letter-spacing:.01em;
    padding:4px 10px; border-radius:9999px; border:1px solid var(--slate-200);
    background:var(--slate-100);
  }
  .attrib a:hover{color:var(--blue); border-color:#bfdbfe}
  .loc-list{display:flex; flex-direction:column; gap:12px}

  /* rainy-day threshold toggle */
  .thresh-toggle{
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    background:#fff; border-radius:14px; padding:10px 12px 10px 14px; margin-bottom:12px;
    box-shadow:0 1px 2px 0 rgba(0,0,0,.05);
  }
  .thresh-label{font-size:15px; font-weight:900; color:var(--slate-700); letter-spacing:-.01em}
  .thresh-seg{display:flex; gap:3px; background:var(--slate-100); border-radius:9px; padding:3px; flex:none}
  .thresh-opt{
    border:none; background:none; cursor:pointer; border-radius:7px;
    padding:6px 11px; font-size:12px; font-weight:900; color:var(--slate-600);
    white-space:nowrap; transition:all .15s; line-height:1.2;
  }
  .thresh-opt small{display:block; font-size:10px; font-weight:800; color:var(--slate-500); letter-spacing:.02em; margin-top:1px}
  .thresh-opt.on{background:#fff; color:var(--blue); box-shadow:0 1px 2px rgba(0,0,0,.08)}
  .thresh-opt.on small{color:#2563eb}

  /* Action bar: on mobile it drops DOWN below the card content as a row of 3 buttons;
     on desktop (>=760px) it overlays the right edge (sliding in). */
  .card-wrap{
    position:relative; width:100%; border-radius:16px; overflow:hidden;
    background:#fff;
    box-shadow:0 4px 6px -1px rgba(0,0,0,.1),0 2px 4px -2px rgba(0,0,0,.1);
    isolation:isolate;
  }
  /* --- mobile default: drop-down row below the card --- */
  .swipe-actions{
    display:flex; width:100%; overflow:hidden;
    max-height:0; opacity:0;
    transition:max-height .24s cubic-bezier(.2,.8,.2,1), opacity .18s;
    border-top:0 solid var(--slate-100);
  }
  .card-wrap.actions-open .swipe-actions{
    max-height:64px; opacity:1; border-top-width:1px;
  }
  .action-btn{
    flex:1; display:flex; align-items:center; justify-content:center;
    border:none; cursor:pointer; color:#fff; height:60px;
    -webkit-tap-highlight-color:transparent;
  }
  .action-btn:active{filter:brightness(.92)}
  .btn-share{background:#10b981}
  .btn-edit{background:#3b82f6}
  .btn-delete{background:#ef4444}
  .card{
    position:relative; z-index:10; background:#fff; width:100%;
  }
  .action-btn svg{width:26px; height:26px}

  /* --- desktop: overlay on the right edge (sliding in), card content unshifted --- */
  @media(min-width:760px){
    .swipe-actions{
      position:absolute; top:0; bottom:0; right:0; width:168px; max-height:none; opacity:1;
      z-index:20; border-top:0;
      transform:translateX(100%);
      transition:transform .2s cubic-bezier(.2,.8,.2,1);
    }
    .card-wrap.actions-open .swipe-actions{ transform:translateX(0); max-height:none; }
    .action-btn{height:auto}
    .card-wrap.actions-open .card-head,
    .card-wrap.actions-open .card-body{
      padding-right:180px; transition:padding-right .2s cubic-bezier(.2,.8,.2,1);
    }
  }
  .card-head{display:flex; align-items:center; gap:12px; padding:14px 16px 10px}
  .pin{
    width:38px; height:38px; border-radius:11px; flex:none;
    background:linear-gradient(135deg,#38bdf8 0%,#0284c7 100%);
    display:flex; align-items:center; justify-content:center; font-size:19px;
    box-shadow:0 1px 2px 0 rgba(0,0,0,.05);
  }
  .card-name-wrap{flex:1; min-width:0}
  .card-name{
    font-size:18px; font-weight:900; letter-spacing:-.02em; color:var(--slate-900);
    line-height:1.15; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .card-coords{font-size:12px; font-weight:700; color:var(--slate-400); margin-top:2px}
  .grip{
    color:var(--slate-300); flex:none; display:flex; align-items:center; justify-content:center;
    width:36px; height:36px; margin:-6px -8px -6px 0; padding:0;
    border:none; background:none; cursor:pointer; border-radius:9px;
    transition:color .15s, background .15s; -webkit-tap-highlight-color:transparent;
  }
  .grip:hover{color:var(--slate-500); background:var(--slate-100)}
  .grip:active{transform:scale(.9)}

  /* recycle-bin entry link (on Add view) */
  .bin-entry{
    display:flex; align-items:center; justify-content:center; gap:8px; width:100%;
    margin-top:14px; padding:11px; border:none; background:none; cursor:pointer;
    color:var(--slate-500); font-size:13px; font-weight:800; transition:color .15s;
  }
  .bin-entry:hover{color:var(--slate-700)}
  .bin-entry-count{
    min-width:18px; height:18px; padding:0 5px; background:#ef4444; color:#fff;
    font-size:10px; font-weight:900; border-radius:9999px;
    display:flex; align-items:center; justify-content:center;
  }
  .bin-entry-count.hidden{display:none}
  /* back-to-add link (on Recycle view) */
  .bin-back{
    display:flex; align-items:center; gap:7px; margin-bottom:14px; padding:6px 0;
    border:none; background:none; cursor:pointer; color:var(--blue);
    font-size:14px; font-weight:800;
  }
  .bin-back:active{opacity:.6}


  .bin-row{
    display:flex; align-items:center; gap:10px; background:var(--slate-50);
    border:1px solid var(--slate-100); border-radius:12px; padding:11px 12px; margin-bottom:8px;
  }
  .bin-info{flex:1; min-width:0}
  .bin-name{font-size:15px; font-weight:900; color:var(--slate-700); white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .bin-coords{font-size:11px; font-weight:700; color:var(--slate-400); margin-top:1px}
  .bin-btn{border:none; border-radius:9px; padding:9px 12px; font-size:11px; font-weight:900; text-transform:uppercase; letter-spacing:.03em; cursor:pointer; flex:none; transition:transform .15s}
  .bin-btn:active{transform:scale(.92)}
  .bin-restore{background:#dbeafe; color:var(--blue)}
  .bin-purge{background:#fee2e2; color:#dc2626}

  .card-body{padding:0 16px 14px}
  .stat-row{display:flex; gap:10px; margin-bottom:12px}
  .stat{
    flex:1; min-width:0; border-radius:12px; padding:11px 13px;
    display:flex; align-items:center; justify-content:space-between; gap:8px;
  }
  .stat.rain{background:#eff6ff}
  .stat.days{background:#ecfdf5}
  .stat .n{font-size:26px; font-weight:900; line-height:1; letter-spacing:-.03em; flex:0 0 auto; white-space:nowrap; text-align:right}
  .stat.rain .n{color:var(--blue)}
  .stat.days .n{color:#047857}
  .stat .l{font-size:13px; font-weight:900; line-height:1.15; flex:1 1 auto; min-width:0; word-break:keep-all; overflow-wrap:break-word}
  .stat.rain .l{color:#1d4ed8}
  .stat.days .l{color:#047857}
  .stat .su{font-size:12px; font-weight:900; margin-left:1px; opacity:.85}

  /* 14-day mini bar strip */
  /* dry-spell tracker (flowering-induction signal) */
  .dry-wrap{background:#fffbeb; border:1px solid #fef3c7; border-radius:12px; padding:11px 12px 12px; margin-bottom:12px}
  .dry-cap{font-size:12px; font-weight:900; text-transform:uppercase; letter-spacing:.03em; color:#b45309; margin-bottom:9px}
  .dry-row{display:flex; gap:10px}
  .dry-stat{
    flex:1; min-width:0; background:#fff; border:1px solid #fde68a; border-radius:10px;
    padding:11px 13px; display:flex; align-items:center; justify-content:space-between; gap:6px;
  }
  .dry-stat.hot{background:#fff7ed; border-color:#fdba74}
  .dry-n{font-size:28px; font-weight:900; line-height:1; color:#c2410c; letter-spacing:-.02em; flex:none; white-space:nowrap}
  .dry-stat.hot .dry-n{color:#ea580c}
  .dry-u{font-size:13px; font-weight:900; margin-left:1px}
  .dry-l{font-size:14px; font-weight:900; color:#92400e; line-height:1.2; flex:1; min-width:0; word-break:keep-all}
  .dry-range{display:block; font-size:11px; font-weight:700; color:#b45309; letter-spacing:0; margin-top:2px}

  /* Delta-T trendline (historical spray-condition reference) */
  .dt-wrap{background:var(--slate-50); border:1px solid var(--slate-100); border-radius:12px; padding:10px 12px 8px; margin-bottom:12px}
  .dt-cap{font-size:11px; font-weight:900; text-transform:uppercase; letter-spacing:.02em; color:var(--slate-600); margin-bottom:6px; display:flex; justify-content:space-between; align-items:flex-start; gap:8px}
  .dt-cap>span:first-child{flex:1; min-width:0; line-height:1.3}
  .dt-now{font-weight:800; color:#4f46e5; text-transform:none; letter-spacing:0; flex:none; white-space:nowrap}
  .dt-svg{display:block; width:100%; height:70px}
  .dt-axis{display:flex; justify-content:space-between; font-size:9px; font-weight:700; color:var(--slate-400); margin-top:2px}
  .dt-ref{font-size:11px; font-weight:700; color:var(--slate-600); margin-top:7px; line-height:1.45}
  .dt-legend{display:flex; gap:14px; margin-bottom:4px}
  .dt-legend span{display:flex; align-items:center; gap:5px; font-size:10px; font-weight:800; color:var(--slate-500)}
  .dt-legend i{width:14px; height:0; border-top:2px solid currentColor; display:inline-block}
  .dt-legend .dot-dt{color:#6366f1}
  .dt-legend .dot-temp{color:#f59e0b; border-top-style:dashed}

  .mini-wrap{background:var(--slate-50); border:1px solid var(--slate-100); border-radius:12px; padding:10px 12px 8px; margin-bottom:12px}
  .mini-cap{font-size:11px; font-weight:900; text-transform:uppercase; letter-spacing:.03em; color:var(--slate-600); margin-bottom:8px; display:flex; justify-content:space-between; align-items:center}
  .mini-cap .mx{font-weight:800; color:var(--slate-600); text-transform:none; letter-spacing:0}
  .mini-bars{display:flex; align-items:flex-end; gap:3px; height:46px}
  .mini-col{flex:1; display:flex; flex-direction:column; justify-content:flex-end; align-items:center; height:100%}
  .mini-bar{width:100%; min-height:2px; border-radius:3px 3px 0 0; background:#bfdbfe}
  .mini-bar.wet{background:linear-gradient(180deg,#38bdf8 0%,#1d4ed8 100%)}
  .mini-bar.dry{background:var(--slate-200)}
  .mini-bar.nodata{background:repeating-linear-gradient(45deg,var(--slate-100),var(--slate-100) 2px,#fff 2px,#fff 4px); border:1px dashed var(--slate-200)}
  .mini-axis{display:flex; justify-content:space-between; font-size:9px; font-weight:700; color:var(--slate-400); margin-top:5px}

  /* monthly rollup */
  .month-wrap{margin-bottom:12px}
  .month-cap{font-size:10px; font-weight:900; text-transform:uppercase; letter-spacing:.04em; color:var(--slate-500); margin-bottom:7px}
  .month-row{display:flex; align-items:center; gap:10px; padding:7px 0; border-bottom:1px solid var(--slate-100)}
  .month-row:last-child{border-bottom:none}
  .month-name{font-size:13px; font-weight:900; color:var(--slate-700); width:62px; flex:none}
  .month-track{flex:1; height:8px; background:var(--slate-100); border-radius:5px; overflow:hidden}
  .month-fill{height:100%; border-radius:5px; background:linear-gradient(90deg,#38bdf8 0%,#1d4ed8 100%)}
  .month-mm{font-size:13px; font-weight:900; color:var(--blue); width:62px; text-align:right; flex:none; font-variant-numeric:tabular-nums}
  .month-days{font-size:12px; font-weight:900; color:#047857; width:40px; text-align:right; flex:none; font-variant-numeric:tabular-nums}
  .month-partial{color:#c8842b; font-weight:900; margin-left:2px}
  .month-note{font-size:11px; font-weight:700; color:var(--slate-600); margin-top:8px; line-height:1.45}

  .btn-row{display:flex; gap:8px}
  .act{
    flex:1; border:none; border-radius:10px; padding:12px 8px;
    font-size:12px; font-weight:900; text-transform:uppercase; letter-spacing:.04em;
    color:#fff; cursor:pointer; display:flex; align-items:center; justify-content:center;
    gap:6px; box-shadow:0 4px 6px -1px rgba(0,0,0,.1),0 2px 4px -2px rgba(0,0,0,.1);
    transition:transform .15s; line-height:1.2;
  }
  .act:active{transform:scale(.95)}
  .act:disabled{opacity:.45; box-shadow:none; transform:none; cursor:default}
  .act-get{background:linear-gradient(135deg,#2563eb 0%,#1d4ed8 100%)}
  .act-xls{background:linear-gradient(135deg,#059669 0%,#047857 100%)}
  .card-status{font-size:12px; font-weight:700; text-align:center; margin-top:9px; min-height:1em; color:var(--slate-400)}
  .empty{text-align:center; padding:56px 24px; color:var(--slate-400)}
  .empty .big{font-size:52px; margin-bottom:12px}
  .empty .t{font-size:17px; font-weight:900; color:var(--slate-600)}
  .empty .d{font-size:13px; font-weight:600; margin-top:6px}
  /* full-screen user guide */
  .guide-overlay{
    position:fixed; left:0; right:0; bottom:0;
    top:calc(76px + var(--safe-top));   /* start below the sticky header */
    z-index:45;                          /* above attrib pill, below header (50) */
    background:var(--slate-50);
    display:flex; flex-direction:column;
    transform:translateY(100%); transition:transform .28s cubic-bezier(.2,.8,.2,1);
    visibility:hidden;
  }
  .guide-overlay.on{transform:translateY(0); visibility:visible}
  .guide-top{
    flex:none; display:flex; align-items:center; justify-content:space-between;
    padding:16px 18px 14px; background:#fff;
    border-bottom:1px solid var(--slate-200);
  }
  .guide-top-title{font-size:19px; font-weight:900; color:var(--slate-900); letter-spacing:-.02em}
  .guide-close{
    width:38px; height:38px; display:flex; align-items:center; justify-content:center;
    border:none; background:var(--slate-100); border-radius:9999px; color:var(--slate-600);
    cursor:pointer; flex:none; transition:transform .15s;
  }
  .guide-close:active{transform:scale(.9)}
  .guide-body{
    flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch;
    padding:18px 18px calc(40px + var(--safe-bottom)); max-width:680px; width:100%; margin:0 auto;
  }
  .g-sec{margin-bottom:22px}
  .g-h{display:flex; align-items:center; gap:10px; margin-bottom:8px}
  .g-ico{
    width:30px; height:30px; flex:none; border-radius:9px; display:flex; align-items:center; justify-content:center;
    font-size:16px;
  }
  .g-h h3{font-size:16px; font-weight:900; color:var(--slate-900); letter-spacing:-.01em}
  .g-sec p{font-size:14px; font-weight:500; color:var(--slate-600); line-height:1.6; margin-left:40px}
  .g-sec p b{font-weight:900; color:var(--slate-800)}
  .g-intro{font-size:14px; font-weight:600; color:var(--slate-600); line-height:1.6; margin-bottom:24px;
    background:#fff; border:1px solid var(--slate-200); border-radius:12px; padding:14px 16px}
  .g-foot{font-size:12px; font-weight:600; color:var(--slate-400); line-height:1.6; text-align:center;
    margin-top:8px; padding-top:18px; border-top:1px solid var(--slate-200)}
  .g-qr{margin:26px 0 8px; text-align:center}
  .g-qr-title{font-size:15px; font-weight:900; color:var(--slate-800); margin-bottom:12px}
  .g-qr-box{display:inline-block; background:#fff; padding:14px; border-radius:16px; border:1px solid var(--slate-200);
    box-shadow:0 4px 6px -1px rgba(0,0,0,.06)}
  .g-qr-box svg{display:block}
  .g-qr-sub{font-size:12px; font-weight:600; color:var(--slate-500); margin-top:10px; line-height:1.5}

  .overlay{
    position:fixed; inset:0; background:rgba(15,23,42,.5); z-index:1000;
    display:none; align-items:flex-end; justify-content:center;
  }
  .overlay.on{display:flex}
  .sheet{
    background:#fff; width:100%; max-width:760px;
    border-radius:22px 22px 0 0; padding:22px 18px;
    padding-bottom:calc(26px + var(--safe-bottom));
    max-height:92vh; overflow:auto; position:relative;
  }
  .sheet h2{font-size:19px; font-weight:900; color:var(--slate-900); margin:0 0 4px; letter-spacing:-.02em}
  .sheet .sd{font-size:13px; font-weight:600; color:var(--slate-500); margin-bottom:16px}
  .x-btn{
    position:absolute; top:16px; right:16px; background:none; border:none;
    color:var(--slate-300); cursor:pointer; padding:6px; line-height:1;
  }
  label{display:block; font-size:10px; font-weight:900; text-transform:uppercase; letter-spacing:.06em; color:var(--slate-500); margin:14px 0 6px}
  input{
    width:100%; border:1.5px solid var(--slate-200); border-radius:11px;
    padding:13px; font-size:17px; font-weight:600; background:#fff; color:var(--slate-900);
    font-family:inherit;
  }
  input::placeholder{font-weight:400; color:var(--slate-400)}
  input:focus{outline:none; border-color:var(--blue); box-shadow:0 0 0 3px rgba(29,78,216,.12)}
  .coord-pair{display:flex; gap:10px}
  .coord-pair>div{flex:1}
  .gps-btn{
    width:100%; margin-top:12px; background:#eff6ff; color:var(--blue);
    border:1.5px solid #bfdbfe; border-radius:11px; padding:13px;
    font-size:14px; font-weight:900; cursor:pointer; text-transform:uppercase; letter-spacing:.03em;
    display:flex; align-items:center; justify-content:center; gap:8px; transition:transform .15s;
  }
  .gps-btn:active{transform:scale(.97)}
  .gps-status{font-size:12px; font-weight:700; text-align:center; margin-top:8px; min-height:1em; color:var(--slate-400)}
  .sheet-actions{display:flex; gap:10px; margin-top:22px}
  .s-act{flex:1; border:none; border-radius:12px; padding:14px; font-size:15px; font-weight:900; cursor:pointer; transition:transform .15s; letter-spacing:.02em}
  .s-act:active{transform:scale(.96)}
  .s-cancel{background:var(--slate-100); color:var(--slate-600)}
  .s-save{background:linear-gradient(135deg,#2563eb 0%,#1d4ed8 100%); color:#fff; box-shadow:0 4px 6px -1px rgba(29,78,216,.25)}
  .spin{display:inline-block; width:14px; height:14px; border:2.5px solid rgba(255,255,255,.45); border-top-color:#fff; border-radius:50%; animation:sp .7s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}
  @keyframes bootspin{to{transform:rotate(360deg)}}
  @media(min-width:760px){
    .overlay{align-items:center}
    .sheet{border-radius:22px; max-height:86vh}
  }
  @media(max-width:430px){
    /* stack each tile: label on top row, big number on its own row below */
    .stat{
      flex-direction:column; align-items:flex-start; justify-content:center;
      gap:4px; padding:11px 13px;
    }
    .stat .l{font-size:13px; line-height:1.2; flex:none; width:100%}
    .stat .n{font-size:27px; text-align:left; width:100%}
    .stat.rain .n{font-size:27px}
    .stat .su, .dry-u{font-size:12px}
    /* dry tiles: same two-row stack — label (+ date range) on top, number below */
    .dry-stat{
      flex-direction:column; align-items:flex-start; justify-content:center;
      gap:4px; padding:11px 13px;
    }
    .dry-l{font-size:13px; line-height:1.2; flex:none; width:100%}
    .dry-n{font-size:27px; text-align:left; width:100%}
  }
  @media(max-width:380px){
    .h-title h1{font-size:18px}
    .stat .n, .dry-n{font-size:24px}
  }
  @media(max-width:360px){
    .stat .n, .dry-n{font-size:22px}
    .stat .l, .dry-l{font-size:12px}
  }
</style>
</head>

function tr(k){return T[lang][k]}
function applyLang(){
  document.documentElement.lang=lang;
  // At rest, show the CURRENT language's own label. While armed/cycling, leave
  // the hint label alone so a re-render doesn't overwrite it.
  if(!langActive){
    const lb=document.getElementById("langBtn");
    if(lb) lb.textContent=LANG_LBL[lang];
  }
  const s=(id,v)=>{const el=document.getElementById(id); if(el) el.textContent=v;};
  s("t-title",tr("title")); s("t-attrib",tr("attrib"));
  s("t-sheet-title",tr("sheetTitle")); s("t-sheet-desc",tr("sheetDesc"));
  s("t-l-name",tr("lName")); s("t-l-coords",tr("lCoords")); s("t-gps",tr("gps"));
  s("t-cancel",tr("cancel")); s("t-save",tr("save"));
  s("t-bin-entry",tr("recycleTab")); s("t-bin-back",tr("backToAdd"));
  render(); renderBin(); updateBinCount();
  if(document.getElementById("guideOverlay").classList.contains("on")) renderGuide();
}
function langRest(){           // return button to its resting state
  langActive=false;
  const lb=document.getElementById("langBtn");
  if(lb){ lb.classList.remove("lang-active"); lb.textContent=LANG_LBL[lang]; }
  if(langIdleTimer){ clearTimeout(langIdleTimer); langIdleTimer=null; }
}
function langArmIdleReset(){    // reset to rest after ~2.2s of no taps
  if(langIdleTimer) clearTimeout(langIdleTimer);
  langIdleTimer=setTimeout(langRest, 2200);
}
function toggleLang(){
  const lb=document.getElementById("langBtn");
  if(!langActive){
    // First tap: ARM only — highlight + hint the next language, don't switch yet.
    langActive=true;
    const i=LANG_CYCLE.indexOf(lang);
    const next=LANG_CYCLE[(i+1)%LANG_CYCLE.length];
    if(lb){ lb.classList.add("lang-active"); lb.textContent="→ "+LANG_LBL[next]; }
    langArmIdleReset();
    return;
  }
  // Subsequent taps: CYCLE to the next language and apply it.
  const i=LANG_CYCLE.indexOf(lang);
  lang=LANG_CYCLE[(i+1)%LANG_CYCLE.length];
  localStorage.setItem(LANGKEY,lang);
  applyLang();                 // re-render UI in the new language (won't clobber label; langActive=true)
  // update the hint to the NEXT-next language
  const j=LANG_CYCLE.indexOf(lang);
  const next=LANG_CYCLE[(j+1)%LANG_CYCLE.length];
  if(lb){ lb.classList.add("lang-active"); lb.textContent="→ "+LANG_LBL[next]; }
  langArmIdleReset();
}

function esc(s){return(s+"").replace(/[&<>"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[m]))}

/* live count of rainy days from cached daily data, using the current threshold */
function rainyCount(days){
  return days.filter(d=>d.mm!=null && d.mm>=RAIN_DAY_MM).length;
}

/* dry-spell analysis: a "dry day" = below the chosen rainy threshold.
   Returns current ongoing streak (up to the last day) and the longest spell. */
function drySpells(days){
  // known days only, in chronological order
  const seq=days.filter(d=>d.mm!=null);
  let longest=0, longestEnd=-1, run=0;
  for(let i=0;i<seq.length;i++){
    if(seq[i].mm<RAIN_DAY_MM){ run++; if(run>longest){longest=run; longestEnd=i;} }
    else run=0;
  }
  // current streak = dry days at the very end of the sequence
  let cur=0;
  for(let i=seq.length-1;i>=0;i--){ if(seq[i].mm<RAIN_DAY_MM) cur++; else break; }
  let longestRange=null;
  if(longest>0 && longestEnd>=0){
    longestRange={start:seq[longestEnd-longest+1].date, end:seq[longestEnd].date};
  }
  let currentRange=null;
  if(cur>0){
    currentRange={start:seq[seq.length-cur].date, end:seq[seq.length-1].date};
  }
  return {current:cur, longest, longestRange, currentRange};
}
function fmtMD(dateStr){               // "2026-05-03" -> "3/5" (dd/mm, Malaysian)
  const m=parseInt(dateStr.slice(5,7),10), d=parseInt(dateStr.slice(8,10),10);
  return d+"/"+m;
}
/* single date for a 1-day spell, range otherwise */
function spellDates(range){
  if(!range) return "";
  return range.start===range.end ? fmtMD(range.start) : `${fmtMD(range.start)}–${fmtMD(range.end)}`;
}
function dryStreakHTML(days){
  const s=drySpells(days);
  if(s.longest===0) return ""; // no dry days at all in window — nothing to show
  const curHot = s.current>=5;   // 5+ ongoing dry days = induction signal worth highlighting
  const longTxt = spellDates(s.longestRange);
  const curTxt = spellDates(s.currentRange);
  return `<div class="dry-wrap">
    <div class="dry-cap">${tr("dryTitle")}</div>
    <div class="dry-row">
      <div class="dry-stat">
        <div class="dry-l">${tr("dryLongest")}${longTxt?`<span class="dry-range">${longTxt}</span>`:""}</div>
        <div class="dry-n tabular">${s.longest}<span class="dry-u">${tr("dayUnit")}</span></div>
      </div>
      <div class="dry-stat ${curHot?"hot":""}">
        <div class="dry-l">${tr("dryCurrent")}${curTxt?`<span class="dry-range">${curTxt}</span>`:""}</div>
        <div class="dry-n tabular">${s.current}<span class="dry-u">${tr("dayUnit")}</span></div>
      </div>
    </div>
  </div>`;
}

/* aggregate daily records into months (chronological) */
function monthlyAgg(days){
  const map=new Map();
  days.forEach(d=>{
    const key=d.date.slice(0,7); // YYYY-MM
    if(!map.has(key)) map.set(key,{key,mm:0,rainy:0,known:0,total:0});
    const o=map.get(key);
    o.total++;
    if(d.mm!=null){ o.mm+=d.mm; o.known++; if(d.mm>=RAIN_DAY_MM) o.rainy++; }
  });
  return [...map.values()].sort((a,b)=>a.key<b.key?-1:1);
}
/* total shown to the user = sum of the monthly figures AS DISPLAYED (each rounded to 0.1),
   so the headline always equals what the farmer adds up from the monthly rows. */
function displayTotal(days){
  return monthlyAgg(days).reduce((a,m)=>a+Math.round(m.mm*10)/10, 0);
}
function monthLabel(key){
  const m=parseInt(key.slice(5,7),10);
  const yr=key.slice(2,4);
  return tr("monthNames")[m-1]+" '"+yr;
}

/* 14-day mini bar strip */
function miniChartHTML(days){
  const last=days.slice(-14);
  if(!last.length) return "";
  const max=Math.max(...last.map(d=>d.mm==null?0:d.mm),1);
  const bars=last.map(d=>{
    if(d.mm==null){
      return `<div class="mini-col"><div class="mini-bar nodata" style="height:8%"></div></div>`;
    }
    const h=Math.max(2,Math.round((d.mm/max)*100));
    const cls=d.mm>=RAIN_DAY_MM?"wet":"dry";
    return `<div class="mini-col"><div class="mini-bar ${cls}" style="height:${h}%"></div></div>`;
  }).join("");
  const first=fmtMD(last[0].date);
  const lastD=fmtMD(last[last.length-1].date);
  return `<div class="mini-wrap">
    <div class="mini-cap"><span>${tr("last14")}</span><span class="mx">${tr("maxLabel")(max.toFixed(1))}</span></div>
    <div class="mini-bars">${bars}</div>
    <div class="mini-axis"><span>${first}</span><span>${lastD}</span></div>
  </div>`;
}

/* 14-day Delta-T trendline (historical, neutral — no spray verdict bands).
   Shows the daily worst (highest) Delta-T in the 12–15h window, plus the daily
   high temperature as a second line (independent scale, since the units differ). */
function deltaTHTML(days){
  const last=days.slice(-14);
  const dtPts=last.map((d,i)=>({i,dt:d.dt})).filter(p=>p.dt!=null);
  if(dtPts.length<2) return ""; // not enough Delta-T data to draw a trend
  const tPts=last.map((d,i)=>({i,t:d.tmax})).filter(p=>p.t!=null);
  const hasTemp=tPts.length>=2;
  const W=300, H=70, padX=4, padY=8;
  const n=last.length;
  const x=i=> padX + (n<=1?0:(i/(n-1))*(W-2*padX));
  // each metric scaled to its OWN min/max so both read clearly on one chart
  const scale=(arr,getv)=>{
    let lo=Math.min(...arr.map(getv)), hi=Math.max(...arr.map(getv));
    if(hi-lo<2){ const mid=(hi+lo)/2; lo=mid-1; hi=mid+1; }
    return v=> padY + (1-(v-lo)/(hi-lo))*(H-2*padY);
  };
  const yDT=scale(dtPts,p=>p.dt);
  const dtLine=dtPts.map(p=>`${x(p.i).toFixed(1)},${yDT(p.dt).toFixed(1)}`).join(" ");
  const dtDots=dtPts.map(p=>`<circle cx="${x(p.i).toFixed(1)}" cy="${yDT(p.dt).toFixed(1)}" r="2.4" fill="#6366f1"/>`).join("");
  let tempSvg="";
  if(hasTemp){
    const yT=scale(tPts,p=>p.t);
    const tLine=tPts.map(p=>`${x(p.i).toFixed(1)},${yT(p.t).toFixed(1)}`).join(" ");
    const tDots=tPts.map(p=>`<circle cx="${x(p.i).toFixed(1)}" cy="${yT(p.t).toFixed(1)}" r="2.1" fill="#f59e0b"/>`).join("");
    tempSvg=`<polyline fill="none" stroke="#f59e0b" stroke-width="2" stroke-dasharray="1 3" stroke-linejoin="round" stroke-linecap="round" points="${tLine}"/>${tDots}`;
  }
  const first=fmtMD(last[0].date);
  const lastD=fmtMD(last[last.length-1].date);
  const latestDT=dtPts[dtPts.length-1].dt;
  const latestT=hasTemp?tPts[tPts.length-1].t:null;
  const legend=hasTemp?`<div class="dt-legend">
    <span><i class="dot-dt"></i>${tr("dtLegendDT")}</span>
    <span><i class="dot-temp"></i>${tr("dtLegendTemp")}</span>
  </div>`:``;
  const nowTxt=hasTemp
    ? `${tr("dtLatest")} ${latestDT.toFixed(1)}° · ${latestT.toFixed(1)}°C`
    : `${tr("dtLatest")} ${latestDT.toFixed(1)}°`;
  return `<div class="dt-wrap">
    <div class="dt-cap"><span>${tr("dtTitle")}</span><span class="dt-now">${nowTxt}</span></div>
    ${legend}
    <svg class="dt-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <polyline fill="none" stroke="#6366f1" stroke-width="2" stroke-linejoin="round" stroke-linecap="round" points="${dtLine}"/>
      ${dtDots}
      ${tempSvg}
    </svg>
    <div class="dt-axis"><span>${first}</span><span>${lastD}</span></div>
    <div class="dt-ref">${tr("dtRef")}</div>
  </div>`;
}

/* monthly rollup bars */
function monthRollupHTML(days){
  const months=monthlyAgg(days);
  if(months.length<2) return "";
  const max=Math.max(...months.map(m=>m.mm),1);
  const rows=months.map(m=>{
    const w=Math.max(3,Math.round((m.mm/max)*100));
    // partial if not every calendar day of that month is in our window/data
    const dim=new Date(parseInt(m.key.slice(0,4)),parseInt(m.key.slice(5,7)),0).getDate();
    const partial=(m.known<dim);
    const star=partial?`<span class="month-partial" title="${tr("partialNote")}">*</span>`:"";
    return `<div class="month-row">
      <div class="month-name">${monthLabel(m.key)}${star}</div>
      <div class="month-track"><div class="month-fill" style="width:${w}%"></div></div>
      <div class="month-mm tabular">${m.mm.toFixed(1)}</div>
      <div class="month-days tabular">${m.rainy}${lang==="zh"?"天":"d"}</div>
    </div>`;
  }).join("");
  const anyPartial=months.some(m=>{const dim=new Date(parseInt(m.key.slice(0,4)),parseInt(m.key.slice(5,7)),0).getDate(); return m.known<dim;});
  const note=anyPartial?`<div class="month-note">${tr("partialNote")}</div>`:"";
  return `<div class="month-wrap">
    <div class="month-cap">${tr("byMonth")}</div>
    ${rows}
    ${note}
  </div>`;
}

  }

    if(navigator.canShare && navigator.canShare({files:[file]})){
      await navigator.share({files:[file], title:loc.name, text:textMsg()});
      return;
    }
    // Fallback: download the image so the farmer can attach it manually
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url; a.download=file.name; document.body.appendChild(a); a.click();

/* date helper: YYYY-MM-DD in local time */
function ymd(d){
  const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,"0"), dd=String(d.getDate()).padStart(2,"0");
  return `${y}-${m}-${dd}`;
}
/* Delta-T (°C) = dry-bulb − wet-bulb, from air temp (°C) and relative humidity (%).
   Wet-bulb via Stull (2011) empirical approximation — accurate for normal field conditions.
   Spray-band reference: 2–8 ideal, 8–10 marginal, >10 too evaporative, <2 too humid. */
function deltaT(T, RH){
  if(T==null||RH==null) return null;
  RH=Math.max(1,Math.min(100,RH));
  const Tw = T*Math.atan(0.151977*Math.sqrt(RH+8.313659))
           + Math.atan(T+RH) - Math.atan(RH-1.676331)
           + 0.00391838*Math.pow(RH,1.5)*Math.atan(0.023101*RH)
           - 4.686035;
  const d = T - Tw;
  return (isFinite(d) && d>=0) ? d : null;
}
/* On launch: refresh only farms whose data is from a previous day, one at a time
   (throttled), skipping entirely when offline. Keeps the numbers current without
   bursting Open-Meteo. */
function isFromPreviousDay(ts){
  if(!ts) return true;                       // never fetched in this cache shape -> treat as stale
  const f=new Date(ts), n=new Date();
  return f.getFullYear()!==n.getFullYear() || f.getMonth()!==n.getMonth() || f.getDate()!==n.getDate();
}
let autoRefreshing=false;
async function autoRefreshStale(){
  if(autoRefreshing) return;                 // don't overlap runs
  if(navigator.onLine===false) return;       // offline: keep showing cached data, don't error
  // queue farms that have data but it's from a previous day
  const queue=locations.filter(l=>{
    const c=cache[l.id];
    return c && c.days && c.days.length && isFromPreviousDay(c.fetched);
  });
  if(!queue.length) return;
  autoRefreshing=true;
  try{
    for(const loc of queue){
      try{ await getRain(loc.id); }catch(_){}   // getRain handles its own errors/UI
      await new Promise(r=>setTimeout(r, 1200)); // throttle: ~1.2s gap between farms
    }
  }finally{ autoRefreshing=false; }
}
async function getRain(id){
  const loc=locations.find(l=>l.id===id); if(!loc) return;
  const btn=document.getElementById("ld-"+id);
  const st=document.getElementById("st-"+id);
  btn.disabled=true; btn.innerHTML=`<span class="spin"></span> ${tr("loading")}`;
  st.style.color="#94a3b8"; st.textContent="";
  try{
    // Window: first day of the month 3 months ago  ->  yesterday.
    const now=new Date();
    const yesterday=new Date(now); yesterday.setDate(now.getDate()-1);
    const start=new Date(now.getFullYear(), now.getMonth()-3, 1); // 1st of 3 months ago
    const startStr=ymd(start), endStr=ymd(yesterday);

    // Merge map: date -> mm (or null if missing). Seed every day in range as null
    // so a day absent from BOTH sources stays honestly "no data", not 0.
    const merged=new Map();
    for(let d=new Date(start); d<=yesterday; d.setDate(d.getDate()+1)){
      merged.set(ymd(d), null);
    }
    const apply=(dates,vals)=>{
      if(!dates) return;
      dates.forEach((dt,i)=>{
        const v=vals?vals[i]:null;
        if(merged.has(dt) && v!=null && !isNaN(v)) merged.set(dt, v);
      });
    };

    // 1) Archive (ERA5) — gap-free for older days, lags ~5 days behind today.
    const archiveUrl=`https://archive-api.open-meteo.com/v1/archive?latitude=${loc.lat}&longitude=${loc.lng}`
      +`&start_date=${startStr}&end_date=${endStr}&daily=precipitation_sum,temperature_2m_max`
      +`&hourly=temperature_2m,relative_humidity_2m&timezone=auto`;
    // 2) Forecast past_days — covers the recent tail the archive hasn't filled yet.
    const fcUrl=`https://api.open-meteo.com/v1/forecast?latitude=${loc.lat}&longitude=${loc.lng}`
      +`&daily=precipitation_sum,temperature_2m_max&hourly=temperature_2m,relative_humidity_2m`
      +`&past_days=92&forecast_days=0&timezone=auto`;

    // daily max temperature: date -> °C (true daily high from the API)
    const tmaxMap=new Map();
    const applyTmax=(times,maxes)=>{
      if(!times) return;
      times.forEach((t,i)=>{
        const v=maxes?maxes[i]:null;
        if(v!=null && !isNaN(v)) tmaxMap.set(t, v);  // forecast overwrites archive for recent days
      });
    };

    // hourly Delta-T accumulation: date -> highest Delta-T found in its 12:00–15:00 window
    const dtMap=new Map();
    const applyHourly=(times,temps,rhs)=>{
      if(!times) return;
      times.forEach((t,i)=>{
        const hr=parseInt(t.slice(11,13),10);       // "2026-05-03T13:00" -> 13
        if(hr<12 || hr>15) return;                  // only the 12:00–15:00 spray-risk window
        const T=temps?temps[i]:null, RH=rhs?rhs[i]:null;
        if(T==null||RH==null||isNaN(T)||isNaN(RH)) return;
        const dt=deltaT(T,RH);
        if(dt==null) return;
        const day=t.slice(0,10);
        const prev=dtMap.get(day);
        if(prev==null || dt>prev) dtMap.set(day, dt);  // keep the worst (highest) of the window
      });
    };

    let archiveOk=false, fcOk=false;
    // Archive first (bulk of the window)
    try{
      const ar=await fetch(archiveUrl);
      if(ar.ok){ const aj=await ar.json();
        apply(aj.daily?.time, aj.daily?.precipitation_sum);
        applyTmax(aj.daily?.time, aj.daily?.temperature_2m_max);
        applyHourly(aj.hourly?.time, aj.hourly?.temperature_2m, aj.hourly?.relative_humidity_2m);
        archiveOk=true; }
    }catch(_){}
    // Forecast second — overwrites recent days with fresher operational values
    try{
      const fr=await fetch(fcUrl);
      if(fr.ok){ const fj=await fr.json();
        apply(fj.daily?.time, fj.daily?.precipitation_sum);
        applyTmax(fj.daily?.time, fj.daily?.temperature_2m_max);
        applyHourly(fj.hourly?.time, fj.hourly?.temperature_2m, fj.hourly?.relative_humidity_2m);
        fcOk=true; }
    }catch(_){}

    if(!archiveOk && !fcOk) throw new Error("both sources failed");

    // Build chronological day list (mm may be null = no data; dt may be null = no reading)
    const days=[...merged.keys()].sort().map(date=>({
      date, mm:merged.get(date),
      dt:(dtMap.has(date)?Math.round(dtMap.get(date)*10)/10:null),
      tmax:(tmaxMap.has(date)?Math.round(tmaxMap.get(date)*10)/10:null)
    }));
    const known=days.filter(d=>d.mm!=null);
    const total=known.reduce((a,b)=>a+b.mm,0);
    const rainy=known.filter(d=>d.mm>=RAIN_DAY_MM).length;
    const missing=days.length-known.length;

    cache[id]={days,total,rainy,missing,stale:false,fetched:Date.now()};
    saveCache(); render();
  }catch(e){
    btn.disabled=false;
    btn.innerHTML=`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-6.2-8.6"/><polyline points="21 3 21 9 15 9"/></svg> ${cache[id]?tr("reget"):tr("get")}`;
    st.style.color="#ef4444"; st.textContent=tr("errFetch");
  }
}

  }
  // Cached data shows instantly; then quietly refresh any farm whose data is from
  // a previous day (one at a time, skipped if offline).
  setTimeout(autoRefreshStale, 900);
});
// Relaunch from background (PWA reopened from app switcher) doesn't re-fire "load".
// Re-check on return to foreground; autoRefreshStale only acts if data is a day old.
document.addEventListener("visibilitychange",()=>{
  if(document.visibilityState==="visible") autoRefreshStale();
});
</script>
</body>
</html>
